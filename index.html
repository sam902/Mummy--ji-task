<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mummy Ji & Pandit Beta Ji — Parivaar Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#FFF0F5;--card:#FFF;--navy:#6D1B4A;
    --beta:#2563EB;--beta-soft:#E8F2FF;--beta-mid:#C7DEFB;
    --mummy:#E91E8C;--mummy-soft:#FFE8F2;--mummy-mid:#FAD4E5;
    --border:#F8D7E3;--muted:#C48FAA;--text:#4A1530;--sub:#7A3B5A;
    --red:#F43F5E;--amber:#F59E0B;--green:#10B981;--gold:#FFB300;
    --wa:#25D366;--wa2:#128C7E
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);font-family:'DM Sans','Noto Sans Devanagari',sans-serif;color:var(--text);min-height:100vh;overscroll-behavior:none}
  html[lang=hi] body{font-family:'Noto Sans Devanagari','DM Sans',sans-serif}
  input,textarea,button,select{font-family:inherit}
  ::-webkit-scrollbar{width:0}
  #app{max-width:480px;margin:0 auto;min-height:100vh}
  #header{background:radial-gradient(circle at 20% 0%,rgba(255,179,0,.18),transparent 50%),radial-gradient(circle at 80% 100%,rgba(233,30,140,.25),transparent 55%),linear-gradient(145deg,#C2185B,#880E4F 60%,#5B0834);padding:18px 20px 20px;position:sticky;top:0;z-index:20;border-bottom:3px solid var(--gold);box-shadow:0 4px 14px rgba(91,8,52,.25)}
  #header::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:14px 14px;pointer-events:none;opacity:.6}
  #brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative;z-index:1;gap:8px}
  #brand-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#FFD9E8;letter-spacing:1px;text-transform:uppercase;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #brand-name::before{content:"✦ ";color:var(--gold)}
  #brand-name::after{content:" ✦";color:var(--gold)}
  html[lang=hi] #brand-name{font-family:'Noto Sans Devanagari',serif;font-size:15px;letter-spacing:0}
  #lang-toggle{display:flex;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:2px;flex-shrink:0}
  .lang-btn{background:transparent;border:none;color:rgba(255,255,255,.55);font-size:11px;font-weight:800;padding:4px 11px;border-radius:18px;cursor:pointer;letter-spacing:.5px;transition:all .2s;font-family:'DM Sans',sans-serif}
  .lang-btn.active{background:linear-gradient(135deg,var(--gold),#FF9A56);color:#5B0834;box-shadow:0 1px 4px rgba(0,0,0,.3)}
  #settings-btn{background:rgba(255,255,255,.1);border:none;width:30px;height:30px;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #profiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative;z-index:1}
  .pcard{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:18px;padding:14px 10px 12px;text-align:center;backdrop-filter:blur(8px);transition:transform .18s,border-color .18s,background .18s;cursor:pointer;position:relative;overflow:hidden}
  .pcard.active{background:rgba(255,255,255,.16);border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .pcard.active::after{content:"●";position:absolute;top:6px;right:10px;color:var(--green);font-size:10px;text-shadow:0 0 8px var(--green)}
  .pic{width:62px;height:62px;border-radius:50%;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;font-size:34px;border:2.5px solid;background:linear-gradient(160deg,#FFE8F2,#FAD4E5)}
  .pcard.beta .pic{border-color:#7CC4FF;background:linear-gradient(160deg,#E8F2FF,#C7DEFB)}
  .pcard.mummy .pic{border-color:#FFC9DE;background:linear-gradient(160deg,#FFE8F2,#FAD4E5)}
  .pname{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#fff;line-height:1.05;letter-spacing:-.3px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
  html[lang=hi] .pname{font-family:'Noto Sans Devanagari',serif;font-size:18px}
  .prole{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#FFD9E8;margin-top:3px}
  .pcard.beta .prole{color:#C7DEFB}
  html[lang=hi] .prole{font-family:'Noto Sans Devanagari',sans-serif;letter-spacing:0;text-transform:none}
  #overall-wrap{margin-top:14px;position:relative;z-index:1}
  #overall-label{display:flex;justify-content:space-between;margin-bottom:5px;align-items:center}
  #overall-label .l1{font-size:10px;color:#FFD9E8;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
  html[lang=hi] #overall-label .l1{font-family:'Noto Sans Devanagari',sans-serif;letter-spacing:0;text-transform:none;font-size:11px}
  #overall-label .l2{font-size:13px;font-weight:700;color:#fff;font-family:'Cormorant Garamond',serif}
  html[lang=hi] #overall-label .l2{font-family:'Noto Sans Devanagari',serif}
  #overall-bg{height:5px;background:rgba(0,0,0,.25);border-radius:4px;overflow:hidden}
  #overall-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),#FF9A56,#E91E8C);transition:width .5s;box-shadow:0 0 10px rgba(255,179,0,.5)}
  .filter-pills{display:flex;gap:6px;padding:14px 14px 0}
  .fpill{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s}
  .fpill.on{background:linear-gradient(135deg,var(--mummy-soft),var(--mummy-mid));border-color:var(--mummy);color:#9D174D}
  #list{padding:14px 14px 110px}
  #empty{text-align:center;padding:60px 30px}
  #empty .eicon{font-size:52px;margin-bottom:16px}
  #empty h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px}
  html[lang=hi] #empty h2{font-family:'Noto Sans Devanagari',serif}
  #empty p{font-size:13px;color:var(--muted);line-height:1.7}
  .task-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:15px 17px;margin-bottom:11px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:box-shadow .18s,transform .18s;animation:fadeUp .35s ease both;position:relative}
  .task-card:hover{box-shadow:0 6px 22px rgba(233,30,140,.13);transform:translateY(-2px)}
  .task-card.overdue{border-color:rgba(245,158,11,.5)}
  .ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
  .cleft{flex:1;margin-right:11px;min-width:0}
  .ctag{display:inline-block;font-size:10px;font-weight:700;border-radius:6px;padding:2px 7px;letter-spacing:.5px;margin-bottom:4px;background:var(--mummy-soft);color:var(--mummy)}
  .ctag.beta{background:var(--beta-soft);color:var(--beta)}
  html[lang=hi] .ctag{letter-spacing:0;font-family:'Noto Sans Devanagari',sans-serif}
  .ctitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:4px;word-break:break-word}
  html[lang=hi] .ctitle{font-family:'Noto Sans Devanagari',serif}
  .cdate-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:#3D0A22;font-weight:600}
  .cdate-item{display:inline-flex;align-items:center;gap:3px}
  .cdate-item .lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  html[lang=hi] .cdate-item .lbl{letter-spacing:0;text-transform:none}
  .cdate-arrow{color:var(--muted);font-weight:400}
  .cpct{border-radius:12px;padding:5px 11px;text-align:center;min-width:50px;border:1.5px solid;flex-shrink:0}
  .cpct span{font-size:15px;font-weight:800}
  /* Tappable progress bar */
  .cbar-wrap{margin-top:10px;position:relative}
  .cbar-bg{height:11px;background:var(--mummy-mid);border-radius:10px;overflow:hidden;cursor:pointer;position:relative;touch-action:manipulation}
  .cbar-bg:active{filter:brightness(.95)}
  .cbar-fill{height:100%;border-radius:10px;transition:width .25s;pointer-events:none}
  .cbar-ticks{position:absolute;inset:0;display:flex;justify-content:space-between;padding:0 2px;pointer-events:none}
  .cbar-ticks span{width:1px;height:100%;background:rgba(255,255,255,.35)}
  .cbar-hint{font-size:10px;color:var(--muted);margin-top:3px;text-align:center;font-style:italic}
  html[lang=hi] .cbar-hint{font-style:normal;font-family:'Noto Sans Devanagari',sans-serif}
  .ccount{display:flex;gap:8px;margin-top:9px;font-size:11px;color:var(--sub);font-weight:600}
  .ccount span{display:inline-flex;align-items:center;gap:3px;background:#FFF0F5;border-radius:10px;padding:2px 8px}
  .overdue-pill{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFFBEB,#FEF3C7);color:#92400E;font-size:10px;font-weight:800;border-radius:12px;padding:2px 8px 2px 6px;border:1px solid #FBBF24;letter-spacing:.3px;animation:overduePulse 2.5s ease-in-out infinite;line-height:1.2}
  .overdue-pill .star{display:inline-block;animation:starTwinkle 1.4s ease-in-out infinite;font-size:11px;filter:drop-shadow(0 0 2px rgba(251,191,36,.8))}
  html[lang=hi] .overdue-pill{font-family:'Noto Sans Devanagari',sans-serif;letter-spacing:0;font-size:11px}
  @keyframes overduePulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 6px 1px rgba(245,158,11,.35)}}
  @keyframes starTwinkle{0%,100%{opacity:.6;transform:scale(.9) rotate(0deg)}50%{opacity:1;transform:scale(1.25) rotate(72deg)}}
  .overdue-pill-lg{padding:4px 10px 4px 8px;font-size:12px;border-radius:14px}
  #fab{position:fixed;bottom:28px;right:20px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--mummy),#F472B6);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 6px 22px rgba(233,30,140,.45);display:flex;align-items:center;justify-content:center;transition:transform .15s;z-index:50}
  #fab:active{transform:scale(.93)}
  .overlay{position:fixed;inset:0;background:rgba(18,28,40,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none}
  .overlay.open{opacity:1;pointer-events:all}
  .sheet{background:var(--bg);border-radius:26px 26px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.1,.64,1)}
  .overlay.open .sheet{transform:translateY(0)}
  .sh-handle{display:flex;justify-content:center;padding:11px 0 0}
  .sh-handle div{width:42px;height:4px;background:#DDD;border-radius:2px}
  .sh-body{padding:15px 19px 50px}
  .sh-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .sh-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--navy);line-height:1.15}
  html[lang=hi] .sh-title{font-family:'Noto Sans Devanagari',serif;font-size:22px}
  .sh-date{font-size:14px;color:#3D0A22;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .sh-close{background:#FAD4E5;border:none;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px}
  .flabel{font-size:13px;font-weight:700;color:var(--navy);display:block;margin-bottom:6px;letter-spacing:.3px}
  html[lang=hi] .flabel{letter-spacing:0}
  .finput,.ftextarea{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:13px;padding:11px 13px;font-size:14px;color:var(--text);outline:none;margin-bottom:14px}
  .finput:focus,.ftextarea:focus{border-color:var(--mummy);box-shadow:0 0 0 3px rgba(233,30,140,.1)}
  .ftextarea{min-height:75px;resize:vertical;font-family:'DM Sans','Noto Sans Devanagari',sans-serif}
  .tr-row{display:flex;gap:6px;align-items:stretch;margin-bottom:14px}
  .tr-row .finput,.tr-row .ftextarea{margin-bottom:0;flex:1}
  .btn-tr{background:linear-gradient(135deg,var(--gold),#FF9A56);border:none;color:#fff;width:48px;border-radius:13px;font-size:16px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(255,179,0,.35)}
  .btn-tr:active{transform:scale(.94)}
  .btn-tr.busy{opacity:.6;animation:pulse 1s infinite}
  .tr-hint{font-size:11px;color:var(--muted);margin-top:-10px;margin-bottom:10px;font-style:italic}
  .date-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .date-grid .finput{margin-bottom:0}
  .date-grid label{font-size:11px;font-weight:700;color:var(--navy);display:block;margin-bottom:4px;letter-spacing:.3px}
  html[lang=hi] .date-grid label{letter-spacing:0}
  .who-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .who-opt{background:#fff;border:1.5px solid var(--border);border-radius:13px;padding:11px;text-align:center;cursor:pointer;font-weight:600;font-size:13px;color:var(--sub);transition:all .15s}
  .who-opt.sel.beta{background:linear-gradient(135deg,var(--beta-soft),var(--beta-mid));border-color:var(--beta);color:#1E3A8A}
  .who-opt.sel.mummy{background:linear-gradient(135deg,var(--mummy-soft),var(--mummy-mid));border-color:var(--mummy);color:#9D174D}
  .who-opt .emoji{font-size:22px;display:block;margin-bottom:4px}
  .btn-main{width:100%;background:linear-gradient(135deg,var(--mummy),#F472B6);color:#fff;border:none;border-radius:15px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(233,30,140,.35)}
  .btn-danger{width:100%;background:transparent;border:1.5px solid #FECDD3;color:var(--red);border-radius:15px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
  .sec-title{font-size:14px;font-weight:700;color:#3D0A22;margin-bottom:11px;display:flex;align-items:center;gap:6px}
  .sec-wrap{margin-bottom:22px}
  .prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .prog-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:800;color:var(--amber)}
  .prog-bar{height:12px;background:var(--mummy-mid);border-radius:8px;margin-bottom:13px;overflow:hidden}
  .prog-fill{height:100%;border-radius:8px;transition:width .25s;background:linear-gradient(90deg,var(--gold),#FF9A56)}
  .prog-chips{display:flex;gap:5px;flex-wrap:wrap}
  .pchip{background:var(--mummy-mid);color:var(--muted);border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
  .pchip.on{background:linear-gradient(135deg,var(--gold),#FF9A56);color:#fff;font-weight:700}
  .vp-block{background:#fff;border:2px solid var(--mummy);border-radius:16px;padding:13px 14px;margin-bottom:10px}
  .vp-block.beta-side{border-color:var(--beta)}
  .vp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .vp-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .vp-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--mummy-mid)}
  .vp-av.beta-side{background:var(--beta-mid)}
  .vp-name{font-weight:700;font-size:14px;color:var(--navy)}
  .vp-status{font-size:11px;color:var(--muted);margin-top:1px}
  .vp-actions{display:flex;gap:6px;flex-shrink:0}
  .vp-btn{border:none;border-radius:20px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
  .vp-btn.record{background:linear-gradient(135deg,var(--mummy),#F472B6);color:#fff}
  .vp-btn.record.recording{background:linear-gradient(135deg,var(--red),#FB7185);animation:pulse 1s infinite}
  .vp-btn.photo{background:#fff;border:1.5px solid var(--mummy-mid);color:var(--mummy)}
  .vp-note{width:100%;background:var(--mummy-soft);border:1.5px solid var(--mummy-mid);border-radius:12px;padding:9px 12px;font-size:14px;color:var(--text);outline:none;resize:none;min-height:42px;font-family:inherit}
  .vp-note.beta-side{background:var(--beta-soft);border-color:var(--beta-mid)}
  .pm-block{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:13px 14px;margin-bottom:10px}
  .pm-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:48px;font-family:inherit;margin-bottom:10px}
  .pm-ta:focus{border-color:var(--mummy);box-shadow:0 0 0 3px rgba(233,30,140,.08)}
  .pm-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .pm-photo-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mummy);display:flex;align-items:center;gap:4px}
  .pm-who-sel{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--navy);outline:none;min-width:100px;font-family:inherit}
  .pm-post{background:linear-gradient(135deg,var(--mummy),#F472B6);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer}
  .pm-wa{background:linear-gradient(135deg,var(--wa),var(--wa2));color:#fff;border:none;border-radius:20px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
  .pm-pending{margin-top:8px;display:none;align-items:center;gap:8px}
  .pm-pending.show{display:flex}
  .pm-pending img{width:48px;height:48px;border-radius:8px;object-fit:cover}
  .pm-pending .x{background:rgba(0,0,0,.5);color:#fff;border:none;width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer}
  .hist-item{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:8px;animation:fadeUp .25s ease both}
  .hist-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .hist-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--mummy-mid)}
  .hist-av.beta-side{background:var(--beta-mid)}
  .hist-name{font-size:13px;font-weight:700;color:#3D0A22}
  .hist-type{font-size:10px;border-radius:20px;padding:2px 7px;font-weight:700;margin-left:auto}
  .hist-type.text{background:var(--mummy-soft);color:var(--mummy)}
  .hist-type.photo{background:#E0F2FE;color:#0369A1}
  .hist-type.voice{background:#F3E5F5;color:#6A1B9A}
  .hist-text{font-size:14px;color:#3D0A22;line-height:1.5;background:var(--bg);border-radius:8px;padding:7px 10px;margin-bottom:5px;word-break:break-word}
  .hist-img{max-width:100%;border-radius:10px;display:block;cursor:pointer;margin-bottom:5px;max-height:280px;object-fit:cover}
  .hist-voice{display:flex;align-items:center;gap:8px;background:#F8F0FF;border-radius:10px;padding:7px 11px;margin-bottom:5px}
  .hist-voice button{background:#7B1FA2;color:#fff;border:none;border-radius:20px;width:34px;height:30px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .hist-voice .dur{font-size:12px;color:#6A1B9A;font-weight:700}
  .hist-voice .bar{flex:1;height:3px;background:#E1BEE7;border-radius:2px;overflow:hidden}
  .hist-voice .bar div{height:100%;background:#7B1FA2;width:0%;transition:width .15s linear}
  .hist-ts{font-size:11px;color:var(--muted);font-weight:600}
  .hist-del{background:transparent;border:none;color:#FCA5A5;font-size:11px;cursor:pointer;margin-left:6px;font-family:inherit}
  .hist-empty{font-size:13px;color:var(--muted);text-align:center;padding:16px 0;font-style:italic}
  #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  #lightbox.open{display:flex}
  #lightbox img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}

  #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#880E4F;color:#fff;border-radius:30px;padding:10px 22px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;max-width:90vw}

    edit_basic:'जानकारी बदलें',delete_btn:'हटाएं',
    confirm_del_task:'क्या वाकई हटाना है?',confirm_del_msg:'यह संदेश हटाना है?',
    updated:'बदला गया ✓',added:'जोड़ा गया ✓',deleted:'हट गया',
    photo_added:'फोटो जोड़ी गई ✓',voice_saved:'आवाज़ नोट सेव हो गया ✓',
    note_saved:'नोट सेव हो गया ✓',posted:'भेज दिया गया ✓',
    mic_denied:'माइक एक्सेस नहीं मिला',note_needed:'नोट लिखें',
    msg_needed:'संदेश या फोटो ज़रूरी है',name_needed:'काम का नाम ज़रूरी है',
    storage_full:'स्टोरेज भर गया — पुरानी फोटो हटाएं',
    no_date:'कोई तारीख नहीं',
    greet_beta:'नमस्ते पंडित बेटा जी 👦',greet_mummy:'नमस्ते मम्मी जी 🙏',
    tag_beta:'पंडित बेटा जी',tag_mummy:'मम्मी जी',
    type_text:'लिखित',type_photo:'फोटो',type_voice:'आवाज़',
    overdue:'देर हो गई',delete_word:'हटाएं',date_locale:'hi-IN',

    tr_empty:'पहले कुछ लिखें',
    bar_hint:'👆 प्रगति बार दबाकर बदलें',
    of:'में से',done_word:'पूरे',
    no_tasks:'अभी कोई काम नहीं'
  }
};
function t(key){return (T[state.lang]||T.en)[key] ?? T.en[key] ?? key}

let state={tasks:[],lang:localStorage.getItem('mk_lang')||'en',currentWho:localStorage.getItem('mk_who')||'beta',formWho:'beta',filter:'all',editingId:null,detailId:null,pendingPhoto:null,recorder:null,recChunks:[],recStartTs:0};
try{state.tasks=JSON.parse(localStorage.getItem('mk_tasks_v2')||'[]')}catch(e){state.tasks=[]}

if(state.tasks.length===0&&!localStorage.getItem('mk_seeded_v2')){
  state.tasks=[
    {id:'t1',who:'mummy',title:'Doctor ki appointment book karni hai',title_hi:'डॉक्टर की अपॉइंटमेंट बुक करनी है',title_en:"Book the doctor's appointment",startDate:'2026-05-22',date:'2026-05-28',notes:'Knee check-up ke liye',notes_hi:'घुटने की जाँच के लिए',notes_en:'For the knee check-up',progress:30,createdAt:Date.now(),chat:[]},
    {id:'t2',who:'beta',title:'Mummy ke liye dawai laana',title_hi:'मम्मी जी के लिए दवाई लानी है',title_en:"Bring Mummy's medicine",startDate:'2026-05-18',date:'2026-05-20',notes:'BP medicine pharmacy se',notes_hi:'फार्मेसी से बी॰पी॰ की दवाई',notes_en:'BP medicine from the pharmacy',progress:0,createdAt:Date.now()-3600000,chat:[]}
  ];
  localStorage.setItem('mk_seeded_v2','1');save();
}

if(!localStorage.getItem('mk_hindi_seeds_v2')){
  const t1=state.tasks.find(x=>x.id==='t1');
  if(t1&&!t1.title_hi&&t1.title&&t1.title.toLowerCase().includes('doctor')){t1.title_hi='डॉक्टर की अपॉइंटमेंट बुक करनी है';t1.notes_hi='घुटने की जाँच के लिए'}
  const t2=state.tasks.find(x=>x.id==='t2');
  if(t2&&!t2.title_hi&&t2.title&&t2.title.toLowerCase().includes('dawai')){t2.title_hi='मम्मी जी के लिए दवाई लानी है';t2.notes_hi='फार्मेसी से बी॰पी॰ की दवाई'}
  localStorage.setItem('mk_hindi_seeds_v2','1');save();
}

function save(){try{localStorage.setItem('mk_tasks_v2',JSON.stringify(state.tasks));localStorage.setItem('mk_who',state.currentWho);localStorage.setItem('mk_lang',state.lang)}catch(e){toast(t('storage_full'))}}
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,7)}
function esc(s){return(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m])}
function fmtDate(d){if(!d)return null;return new Date(d+'T00:00').toLocaleDateString(t('date_locale'),{day:'numeric',month:'short'})}
function fmtDateFull(d){if(!d)return t('no_date');return new Date(d+'T00:00').toLocaleDateString(t('date_locale'),{weekday:'short',day:'numeric',month:'short'})}
function fmtTs(ts){return new Date(ts).toLocaleString(t('date_locale'),{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'})}
function whoLabel(w){return w==='beta'?t('beta_name'):t('mummy_name')}
function whoEmoji(w){return w==='beta'?'👦':'👩'}
function displayTitle(task){if(state.lang==='hi'&&task.title_hi)return task.title_hi;if(state.lang==='en'&&task.title_en)return task.title_en;return task.title}
function displayNotes(task){if(state.lang==='hi'&&task.notes_hi)return task.notes_hi;if(state.lang==='en'&&task.notes_en)return task.notes_en;return task.notes}

async function gtranslate(text,target){try{const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;const res=await fetch(url);if(!res.ok)throw 0;const data=await res.json();return data[0].map(p=>p[0]).join('')}catch(e){return null}}
async function translateField(id){const el=document.getElementById(id);const text=(el.value||'').trim();if(!text){toast(t('tr_empty'));return}const btn=el.parentElement.querySelector('.btn-tr');btn.classList.add('busy');toast(t('tr_busy'));const out=await gtranslate(text,state.lang);btn.classList.remove('busy');if(out){el.value=out;toast(t('tr_ok'))}else toast(t('tr_fail'))}

function isOverdue(task){if(!task.date||task.progress>=100)return false;const today=new Date();today.setHours(0,0,0,0);const due=new Date(task.date+'T00:00');return due<today}
function overduePill(big){return `<span class="overdue-pill ${big?'overdue-pill-lg':''}"><span class="star">⭐</span>${t('overdue')}</span>`}

function setLang(l){state.lang=l;document.documentElement.lang=l;localStorage.setItem('mk_lang',l);document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));applyStaticI18n();render();if(state.detailId&&document.getElementById('ov-detail').classList.contains('open'))renderDetail()}
function applyStaticI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n)});document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.dataset.i18nPh)});const sel=document.getElementById('pm-who');if(sel){sel.options[0].text='👦 '+t('beta_name');sel.options[1].text='👩 '+t('mummy_name')}document.title=t('mummy_name')+' & '+t('beta_name')+' — '+t('brand')}

function selectWho(w){state.currentWho=w;document.querySelectorAll('.pcard').forEach(c=>c.classList.toggle('active',c.dataset.who===w));save();toast(w==='beta'?t('greet_beta'):t('greet_mummy'));if(state.detailId&&document.getElementById('ov-detail').classList.contains('open'))renderDetail()}
function setFilter(f){state.filter=f;document.querySelectorAll('.fpill').forEach(p=>p.classList.toggle('on',p.dataset.filter===f));render()}

function dateRow(task){
  const s=fmtDate(task.startDate);
  const d=fmtDate(task.date);
  if(s&&d)return `<span class="cdate-item"><span class="lbl">${t('start_lbl')}</span>🚀 ${s}</span><span class="cdate-arrow">→</span><span class="cdate-item"><span class="lbl">${t('due_lbl')}</span>🏁 ${d}</span>`;
  if(d)return `<span class="cdate-item">🏁 ${d}</span>`;
  if(s)return `<span class="cdate-item">🚀 ${s}</span>`;
  return `<span class="cdate-item">📅 ${t('no_date')}</span>`;
}

function render(){
  const list=document.getElementById('list');
  let tasks=state.tasks.slice();
  if(state.filter!=='all')tasks=tasks.filter(x=>x.who===state.filter);
  tasks.sort((a,b)=>{const ao=isOverdue(a),bo=isOverdue(b);if(ao&&!bo)return -1;if(bo&&!ao)return 1;if(a.progress===100&&b.progress!==100)return 1;if(b.progress===100&&a.progress!==100)return -1;return(b.createdAt||0)-(a.createdAt||0)});
  if(!tasks.length){
    list.innerHTML=`<div id="empty"><div class="eicon">🌸</div><h2>${t('empty_title')}</h2><p>${t('empty_sub')}</p></div>`;
  }else{
    list.innerHTML=tasks.map(task=>{
      const isBeta=task.who==='beta';
      const accent=isBeta?'var(--beta)':'var(--mummy)';
      const grad2=isBeta?'#60A5FA':'#F472B6';
      const bgSoft=isBeta?'var(--beta-soft)':'var(--mummy-soft)';
      const chat=task.chat||[];
      const photoCnt=chat.filter(c=>c.type==='photo').length;
      const voiceCnt=chat.filter(c=>c.type==='voice').length;
      const textCnt=chat.filter(c=>c.type==='text').length;
      const od=isOverdue(task);
      return `<div class="task-card ${od?'overdue':''}" onclick="openDetail('${task.id}')">
        <div class="ctop">
          <div class="cleft">
            <span class="ctag ${isBeta?'beta':''}">${isBeta?t('tag_beta'):t('tag_mummy')}</span>
            <div class="ctitle">${esc(displayTitle(task))}</div>
            <div class="cdate-row">
              ${dateRow(task)}
              ${od?overduePill():''}
            </div>
          </div>
          <div class="cpct" style="background:${bgSoft};border-color:${accent};color:${accent}"><span>${task.progress}%</span></div>
        </div>
        <div class="cbar-wrap" onclick="event.stopPropagation()">
          <div class="cbar-bg" onclick="quickProg(event,'${task.id}')">
            <div class="cbar-fill" style="width:${task.progress}%;background:linear-gradient(90deg,${accent},${grad2})"></div>
          </div>
          <div class="cbar-hint">${t('bar_hint')}</div>
        </div>
        ${chat.length?`<div class="ccount">${textCnt?`<span>💬 ${textCnt}</span>`:''}${photoCnt?`<span>📷 ${photoCnt}</span>`:''}${voiceCnt?`<span>🎙 ${voiceCnt}</span>`:''}</div>`:''}
      </div>`;
    }).join('');
  }

  // Top progress: count tasks done out of total (uses ALL tasks, not filtered)
  const all=state.tasks;
  const done=all.filter(x=>x.progress>=100).length;
  const total=all.length;
  const stat=document.getElementById('overall-stat');
  if(total===0){stat.textContent='— ';}
  else{stat.textContent=`${done} ${t('of')} ${total} ${t('done_word')}`;}
  if(total){const avg=Math.round(all.reduce((s,x)=>s+x.progress,0)/total);document.getElementById('overall-fill').style.width=avg+'%'}
  else document.getElementById('overall-fill').style.width='0%';
}

// Tappable progress bar — set % based on tap position
function quickProg(e,id){
  e.stopPropagation();
  const bar=e.currentTarget;
  const rect=bar.getBoundingClientRect();
  const clientX=(e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX);
  const x=Math.max(0,Math.min(rect.width,clientX-rect.left));
  let pct=Math.round((x/rect.width)*100/5)*5;
  pct=Math.max(0,Math.min(100,pct));
  const task=state.tasks.find(z=>z.id===id);
  if(task){task.progress=pct;save();render();if(state.detailId===id&&document.getElementById('ov-detail').classList.contains('open'))renderDetail();toast(pct+'%')}
}

function pickWho(w){state.formWho=w;document.querySelectorAll('.who-opt').forEach(o=>o.classList.toggle('sel',o.dataset.who===w))}
function openAdd(){state.editingId=null;document.getElementById('add-title').textContent=t('new_task');document.getElementById('f-title').value='';document.getElementById('f-start').value='';document.getElementById('f-date').value='';document.getElementById('f-notes').value='';pickWho(state.currentWho);document.getElementById('ov-add').classList.add('open')}
function editBasic(){const tk=state.tasks.find(x=>x.id===state.detailId);if(!tk)return;state.editingId=tk.id;document.getElementById('add-title').textContent=t('edit_task');document.getElementById('f-title').value=displayTitle(tk);document.getElementById('f-start').value=tk.startDate||'';document.getElementById('f-date').value=tk.date||'';document.getElementById('f-notes').value=displayNotes(tk)||'';pickWho(tk.who);document.getElementById('ov-add').classList.add('open')}

async function saveTask(){
  const titleInput=document.getElementById('f-title').value.trim();
  if(!titleInput){toast(t('name_needed'));return}
  const notesInput=document.getElementById('f-notes').value.trim();
  const date=document.getElementById('f-date').value;
  const startDate=document.getElementById('f-start').value;
  const who=state.formWho;
  let task;
  if(state.editingId){task=state.tasks.find(x=>x.id===state.editingId)}
  else{task={id:uid(),who,progress:0,createdAt:Date.now(),chat:[]};state.tasks.push(task)}
  task.who=who;task.date=date;task.startDate=startDate;
  if(state.lang==='hi'){task.title_hi=titleInput;task.notes_hi=notesInput;if(!task.title)task.title=titleInput;if(!task.notes)task.notes=notesInput}
  else{task.title=titleInput;task.notes=notesInput;task.title_en=titleInput;task.notes_en=notesInput}
  save();render();if(state.detailId)renderDetail();closeOverlay('ov-add');
  toast(state.editingId?t('updated'):t('added'));
  const otherLang=state.lang==='hi'?'en':'hi';
  const titleKey=otherLang==='hi'?'title_hi':'title_en';
  const notesKey=otherLang==='hi'?'notes_hi':'notes_en';
  if(!task[titleKey]&&titleInput){const tr=await gtranslate(titleInput,otherLang);if(tr){task[titleKey]=tr;save();render()}}
  if(!task[notesKey]&&notesInput){const tr=await gtranslate(notesInput,otherLang);if(tr){task[notesKey]=tr;save();render()}}
}

function deleteTask(){if(!state.detailId)return;if(!confirm(t('confirm_del_task')))return;state.tasks=state.tasks.filter(x=>x.id!==state.detailId);save();render();closeOverlay('ov-detail');toast(t('deleted'))}
function openDetail(id){state.detailId=id;state.pendingPhoto=null;document.getElementById('pm-pending').classList.remove('show');document.getElementById('pm-text').value='';renderDetail();document.getElementById('ov-detail').classList.add('open')}

function renderDetail(){
  const tk=state.tasks.find(x=>x.id===state.detailId);
  if(!tk)return;
  document.getElementById('d-title').textContent=displayTitle(tk);
  const od=isOverdue(tk);
  const s=fmtDateFull(tk.startDate);
  const d=fmtDateFull(tk.date);
  let dateHTML='';
  if(tk.startDate&&tk.date)dateHTML=`🚀 ${s} → 🏁 ${d}`;
  else if(tk.date)dateHTML=`🏁 ${d}`;
  else if(tk.startDate)dateHTML=`🚀 ${s}`;
  else dateHTML=`📅 ${t('no_date')}`;
  document.getElementById('d-date').innerHTML=`${dateHTML} ${od?overduePill(true):''}`;
  document.getElementById('d-prog-val').textContent=tk.progress+'%';
  document.getElementById('d-prog-fill').style.width=tk.progress+'%';
  const steps=[0,10,20,25,30,40,50,60,70,75,80,90,100];
  document.getElementById('d-prog-chips').innerHTML=steps.map(s=>`<button class="pchip ${s===tk.progress?'on':''}" onclick="setProg(${s})">${s}%</button>`).join('');
  const w=state.currentWho;
  document.getElementById('vp-av').textContent=whoEmoji(w);
  document.getElementById('vp-av').className='vp-av'+(w==='beta'?' beta-side':'');
  document.getElementById('vp-block').className='vp-block'+(w==='beta'?' beta-side':'');
  document.getElementById('vp-name').textContent=whoLabel(w);
  document.getElementById('vp-note').className='vp-note'+(w==='beta'?' beta-side':'');
  document.getElementById('vp-status').textContent=t('tap_record');
  document.getElementById('pm-who').value=w;
  const chat=(tk.chat||[]).slice().sort((a,b)=>b.ts-a.ts);
  document.getElementById('d-hist-count').textContent=chat.length;
  if(!chat.length){document.getElementById('d-hist').innerHTML=`<div class="hist-empty">${t('no_messages')}</div>`}
  else{
    document.getElementById('d-hist').innerHTML=chat.map(c=>{
      const av=c.author==='beta'?'beta-side':'';
      let body='';
      const typeLabel=c.type==='text'?t('type_text'):c.type==='photo'?t('type_photo'):t('type_voice');
      if(c.type==='text')body=`<div class="hist-text">${esc(c.content)}</div>`;
      else if(c.type==='photo'){body=`<img class="hist-img" src="${c.content}" onclick="showLB('${c.id}')"/>`;if(c.caption)body+=`<div class="hist-text">${esc(c.caption)}</div>`}
      else if(c.type==='voice'){body=`<div class="hist-voice"><button onclick="playVoice('${c.id}',this)">▶</button><div class="bar"><div></div></div><span class="dur">${c.duration||'0:00'}</span></div>`;if(c.caption)body+=`<div class="hist-text">${esc(c.caption)}</div>`}
      return `<div class="hist-item"><div class="hist-top"><div class="hist-av ${av}">${whoEmoji(c.author)}</div><div class="hist-name">${whoLabel(c.author)}</div><span class="hist-type ${c.type}">${typeLabel}</span></div>${body}<div style="display:flex;align-items:center;justify-content:space-between"><div class="hist-ts">${fmtTs(c.ts)}</div><button class="hist-del" onclick="delChat('${c.id}')">${t('delete_word')}</button></div></div>`;
    }).join('');
  }
}
function setProg(v){const tk=state.tasks.find(x=>x.id===state.detailId);if(!tk)return;tk.progress=v;save();render();renderDetail()}
function saveNoteQuick(){const txt=document.getElementById('vp-note').value.trim();if(!txt){toast(t('note_needed'));return}const tk=state.tasks.find(x=>x.id===state.detailId);if(!tk)return;tk.chat=tk.chat||[];tk.chat.push({id:uid(),author:state.currentWho,type:'text',content:txt,ts:Date.now()});save();renderDetail();render();document.getElementById('vp-note').value='';toast(t('note_saved'))}
function addPhotoQuick(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const tk=state.tasks.find(x=>x.id===state.detailId);if(!tk)return;tk.chat=tk.chat||[];tk.chat.push({id:uid(),author:state.currentWho,type:'photo',content:e.target.result,ts:Date.now()});save();renderDetail();render();toast(t('photo_added'))};r.readAsDataURL(f);input.value=''}
async function toggleRec(){const btn=document.getElementById('vp-rec');if(state.recorder&&state.recorder.state==='recording'){state.recorder.stop();return}try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});state.recChunks=[];state.recStartTs=Date.now();state.recorder=new MediaRecorder(stream);state.recorder.ondataavailable=e=>state.recChunks.push(e.data);state.recorder.onstop=()=>{stream.getTracks().forEach(s=>s.stop());const blob=new Blob(state.recChunks,{type:'audio/webm'});const dur=Math.round((Date.now()-state.recStartTs)/1000);const m=Math.floor(dur/60),s=dur%60;const durStr=m+':'+String(s).padStart(2,'0');const r=new FileReader();r.onload=ev=>{const tk=state.tasks.find(x=>x.id===state.detailId);if(!tk)return;tk.chat=tk.chat||[];tk.chat.push({id:uid(),author:state.currentWho,type:'voice',content:ev.target.result,duration:durStr,ts:Date.now()});save();renderDetail();render();toast(t('voice_saved'))};r.readAsDataURL(blob);btn.classList.remove('recording');btn.innerHTML='🎙 '+t('record');document.getElementById('vp-status').textContent=t('tap_record')};state.recorder.start();btn.classList.add('recording');btn.innerHTML='⏹ '+t('stop');document.getElementById('vp-status').textContent=t('recording')}catch(e){toast(t('mic_denied'))}}
function playVoice(cid,btn){const tk=state.tasks.find(x=>x.id===state.detailId);const c=(tk.chat||[]).find(x=>x.id===cid);if(!c)return;const audio=new Audio(c.content);const bar=btn.parentElement.querySelector('.bar div');btn.textContent='⏸';audio.play();audio.ontimeupdate=()=>{if(audio.duration)bar.style.width=(audio.currentTime/audio.duration*100)+'%'};audio.onended=()=>{btn.textContent='▶';bar.style.width='0%'}}
function addPostPhoto(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{state.pendingPhoto=e.target.result;document.getElementById('pm-pending-img').src=e.target.result;document.getElementById('pm-pending').classList.add('show')};r.readAsDataURL(f);input.value=''}
function clearPendingPhoto(){state.pendingPhoto=null;document.getElementById('pm-pending').classList.remove('show')}
function postMessage(){const txt=document.getElementById('pm-text').value.trim();const who=document.getElementById('pm-who').value;if(!txt&&!state.pendingPhoto){toast(t('msg_needed'));return}const tk=state.tasks.find(x=>x.id===state.detailId);if(!tk)return;tk.chat=tk.chat||[];if(state.pendingPhoto){tk.chat.push({id:uid(),author:who,type:'photo',content:state.pendingPhoto,caption:txt,ts:Date.now()})}else{tk.chat.push({id:uid(),author:who,type:'text',content:txt,ts:Date.now()})}document.getElementById('pm-text').value='';clearPendingPhoto();save();renderDetail();render();toast(t('posted'))}
function shareWhatsApp(){const tk=state.tasks.find(x=>x.id===state.detailId);if(!tk)return;const txt=document.getElementById('pm-text').value.trim();let msg=`*${displayTitle(tk)}* (${tk.progress}%)\n`;if(tk.startDate)msg+=`🚀 ${fmtDateFull(tk.startDate)}\n`;if(tk.date)msg+=`🏁 ${fmtDateFull(tk.date)}\n`;if(txt)msg+=`\n${txt}\n`;msg+=`\n— ${whoLabel(document.getElementById('pm-who').value)}`;window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank')}
function delChat(cid){if(!confirm(t('confirm_del_msg')))return;const tk=state.tasks.find(x=>x.id===state.detailId);tk.chat=(tk.chat||[]).filter(c=>c.id!==cid);save();renderDetail();render()}
function showLB(cid){const tk=state.tasks.find(x=>x.id===state.detailId);const c=(tk.chat||[]).find(x=>x.id===cid);if(!c)return;document.getElementById('lb-img').src=c.content;document.getElementById('lightbox').classList.add('open')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open')}
function closeOverlay(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)closeOverlay(o.id)})});
let tT;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2200)}

setLang(state.lang);selectWho(state.currentWho);render();
</script>
